<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Besoin d'aide</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE DE GARDE -->
<header>
    <h1>Besoin d'aide</h1>
    <p>Trouve rapidement un professionnel près de toi</p>
    <a href="#formulaire" class="btn">Commencer</a>
</header>

<!-- FORMULAIRE -->
<section id="formulaire">
    <h2>Fais ta demande</h2>

    <input type="text" id="nom" placeholder="Nom">
    <input type="tel" id="tel" placeholder="Téléphone">
    <input type="text" id="ville" placeholder="Ville">

    <select id="type" onchange="changerOptions()">
        <option value="">Choisir un service</option>
        <option value="docteur">Docteur</option>
        <option value="menage">Femme de ménage</option>
    </select>

    <select id="sousType">
        <option value="">Choisir une option</option>
    </select>

    <textarea id="probleme" placeholder="Explique ton problème"></textarea>

    <button onclick="envoyerDemande()">Valider</button>
</section>

<script src="script.js"></script>
</body>
</html>
